<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Port Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --kin-surface-container-low: #1c1b1c;
      --kin-surface-container-high: #2a2a2b;
      --kin-surface-container-highest: #353436;
      --kin-primary: #75ff9e;
      --kin-on-surface: #e5e2e3;
      --kin-on-surface-variant: #bacbb9;
      --kin-secondary: #ffb3ae;
      --kin-secondary-container: #a00118;
      --kin-outline-variant: #3b4a3d;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--kin-surface-container-low);
      color: var(--kin-on-surface);
      overflow: hidden;
      height: 100vh;
      user-select: none;
      cursor: default;
    }

    .widget {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      outline: 1px solid rgba(59, 74, 61, 0.15);
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(59, 74, 61, 0.1);
      cursor: grab;
      -webkit-app-region: drag;
    }

    .widget-header:active { cursor: grabbing; }

    .widget-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .pulse-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--kin-primary);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .widget-title h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--kin-on-surface);
      opacity: 0.8;
    }

    .widget-actions {
      display: flex;
      gap: 0.25rem;
      -webkit-app-region: no-drag;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      background: transparent;
      border: none;
      color: var(--kin-primary);
      padding: 0.25rem 0.5rem;
      font-size: 0.5625rem;
      font-family: 'Space Grotesk', monospace;
      border-radius: 0.25rem;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(117, 255, 158, 0.1);
      opacity: 1;
    }

    .action-btn .material-symbols-outlined { font-size: 14px; }

    .port-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem;
    }

    .port-list::-webkit-scrollbar { width: 4px; }
    .port-list::-webkit-scrollbar-track { background: transparent; }
    .port-list::-webkit-scrollbar-thumb { background: rgba(59, 74, 61, 0.3); border-radius: 2px; }

    .port-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      transition: all 0.2s ease;
    }

    .port-item:hover { background: var(--kin-surface-container-high); }

    .port-item.system-process { opacity: 0.5; }
    .port-item.system-process:hover { opacity: 0.7; }

    .port-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .process-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--kin-on-surface);
    }

    .port-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.5625rem;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--kin-on-surface-variant);
      opacity: 0.7;
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 0.125rem;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .port-item:hover .row-actions { opacity: 1; }

    .row-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--kin-on-surface-variant);
    }

    .row-btn:hover { background: var(--kin-surface-container-highest); }
    .row-btn.kill:hover { background: rgba(160, 1, 24, 0.2); color: var(--kin-secondary); }
    .row-btn .material-symbols-outlined { font-size: 18px; }

    .footer-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(53, 52, 54, 0.3);
      border-top: 1px solid rgba(59, 74, 61, 0.1);
    }

    .footer-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.125rem;
    }

    .footer-stat .stat-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.4375rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--kin-on-surface-variant);
      opacity: 0.6;
    }

    .footer-stat .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.625rem;
      color: var(--kin-primary);
    }

    .footer-divider {
      width: 1px;
      height: 1.5rem;
      background: rgba(59, 74, 61, 0.1);
    }

    .empty-state, .loading {
      text-align: center;
      padding: 1.5rem;
      color: var(--kin-on-surface-variant);
      opacity: 0.5;
      font-size: 0.625rem;
    }

    .toast {
      position: fixed;
      bottom: 0.5rem;
      right: 0.5rem;
      background: #10b981;
      color: white;
      padding: 0.375rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.625rem;
      opacity: 0;
      transform: translateY(1rem);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #dc2626; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header" id="widgetHeader">
      <div class="widget-title">
        <div class="pulse-dot"></div>
        <h2>Active_Processes</h2>
      </div>
      <div class="widget-actions">
        <button class="action-btn" onclick="toggleSystem()" id="systemBtn" title="Toggle System">
          <span class="material-symbols-outlined">visibility</span>
        </button>
        <button class="action-btn" onclick="loadPorts()" title="Refresh">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
    </div>

    <div class="port-list" id="portList">
      <div class="loading">Loading ports...</div>
    </div>

    <div class="footer-stats" id="footerStats">
      <div class="footer-stat">
        <span class="stat-label">Ports</span>
        <span class="stat-value" id="totalPorts">-</span>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-stat">
        <span class="stat-label">Processes</span>
        <span class="stat-value" id="uniqueProcesses">-</span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_PORT = 8765;
    let allPorts = [];
    let showSystem = false;
    let hiddenPids = JSON.parse(localStorage.getItem('hiddenPids') || '[]');

    async function loadPorts() {
      const portList = document.getElementById('portList');
      portList.innerHTML = '<div class="loading">Loading ports...</div>';

      try {
        const response = await fetch(`http://localhost:${API_PORT}/api/ports?showSystem=${showSystem}`);
        allPorts = await response.json();
        renderPorts(allPorts);
      } catch (error) {
        portList.innerHTML = '<div class="empty-state">Cannot connect to server</div>';
      }
    }

    function renderPorts(ports) {
      const portList = document.getElementById('portList');
      const visiblePorts = ports.filter(p => !hiddenPids.includes(p.pid));

      if (visiblePorts.length === 0) {
        portList.innerHTML = '<div class="empty-state">No active ports</div>';
        document.getElementById('totalPorts').textContent = '0';
        document.getElementById('uniqueProcesses').textContent = '0';
        return;
      }

      const uniqueProcesses = new Set(visiblePorts.map(p => p.processName)).size;
      document.getElementById('totalPorts').textContent = visiblePorts.length;
      document.getElementById('uniqueProcesses').textContent = uniqueProcesses;

      let html = '';
      for (const port of visiblePorts) {
        const systemClass = port.isSystem ? 'system-process' : '';
        html += `
          <div class="port-item ${systemClass}">
            <div class="port-info">
              <span class="process-name">${port.processName}</span>
              <span class="port-label">Port: ${port.port}</span>
            </div>
            <div class="row-actions">
              <button class="row-btn" onclick="hideProcess(${port.pid})" title="Hide">
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
              <button class="row-btn kill" onclick="killPort(${port.pid}, ${port.isSystem})" title="Kill">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>
          </div>
        `;
      }
      portList.innerHTML = html;
    }

    function hideProcess(pid) {
      if (!hiddenPids.includes(pid)) {
        hiddenPids.push(pid);
        localStorage.setItem('hiddenPids', JSON.stringify(hiddenPids));
        showToast('Process hidden');
        loadPorts();
      }
    }

    async function killPort(pid, isSystem) {
      try {
        const response = await fetch(`http://localhost:${API_PORT}/api/kill/${pid}`, { method: 'POST' });
        const result = await response.json();
        if (result.success) {
          hiddenPids = hiddenPids.filter(p => p !== pid);
          localStorage.setItem('hiddenPids', JSON.stringify(hiddenPids));
          showToast('Process killed');
          loadPorts();
        } else {
          showToast(result.error || 'Failed', true);
        }
      } catch (error) {
        showToast('Error', true);
      }
    }

    function toggleSystem() {
      showSystem = !showSystem;
      document.getElementById('systemBtn').style.opacity = showSystem ? '1' : '0.6';
      loadPorts();
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    let dragStart = null;
    document.addEventListener('mousedown', (e) => {
      if (e.target.closest('#widgetHeader')) {
        dragStart = { x: e.screenX, y: e.screenY };
      }
    });

    loadPorts();
    setInterval(loadPorts, 10000);
  </script>
</body>
</html>
